<div
  class="group relative overflow-hidden rounded-xl border border-gray-200 bg-white p-8 transition-all duration-300 hover:border-[#902bcc]/30 hover:shadow-xl hover:shadow-[#902bcc]/5"
>
  <div
    class="mb-4 flex h-12 w-12 items-center justify-center rounded-lg bg-[#902bcc]/10 transition-colors duration-300 group-hover:bg-[#902bcc]/15"
  >
    <mat-icon class="text-[#902bcc]" aria-hidden="false" [fontIcon]="icon()"></mat-icon>
  </div>

  <h3 class="mb-2 text-lg font-semibold text-gray-900">
    {{ title() }}
  </h3>

  <p class="text-sm leading-relaxed text-gray-600">
    {{ description() }}
  </p>

  <div
    class="absolute bottom-0 left-0 h-0.5 w-0 bg-gradient-to-r from-[#902bcc] to-[#7b22b0] transition-all duration-300 group-hover:w-full"
  ></div>
</div>
